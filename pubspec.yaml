name: globalnews
description: NewsClip - Aplikasi kliping berita digital personal. UAS Pemrograman Mobile.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.7.0

  # Local Storage (simpan JWT)
  shared_preferences: ^2.3.2

  # Image caching
  cached_network_image: ^3.4.1

  # Buka link di browser
  url_launcher: ^6.3.1

  # Google Fonts
  google_fonts: ^6.2.1

  # Format tanggal
  intl: ^0.19.0

  # Loading skeleton
  shimmer: ^3.0.0

  # "2 jam yang lalu"
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
